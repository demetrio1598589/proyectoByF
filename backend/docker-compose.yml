version: '3.8'

services:
  api:
    build: .
    container_name: panaderia-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - DB_PORT=${DB_PORT:-3306}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-8h}
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - panaderia-network

networks:
  panaderia-network:
    driver: bridge
    